name: Keep API Warm

on:
  schedule:
    # Every 4 minutes — prevents Railway service from going idle
    - cron: '*/4 * * * *'
  workflow_dispatch:

jobs:
  ping:
    name: Ping Railway API
    runs-on: ubuntu-latest
    steps:
      - name: Ping Health Endpoint
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            "https://bespokelibrary-production.up.railway.app/api/Health?source=keep-warm")

          echo "Health endpoint responded with: $RESPONSE"

          if [ "$RESPONSE" != "200" ]; then
            echo "Warning: Health endpoint returned $RESPONSE"
            exit 1
          fi

      - name: Log result
        if: always()
        run: echo "Keep-warm ping completed at $(date -u)"
