name: Run Access Migration

on:
  workflow_dispatch:

jobs:
  migrate:
    name: Clean up and re-migrate correctly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pymongo[srv] python-dotenv

      - name: Dry run
        env:
          COSMOS_CONNECTION_STRING: ${{ secrets.COSMOS_CONNECTION_STRING }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          DRY_RUN: "1"
        run: python cleanup_and_migrate.py

      - name: Run migration
        env:
          COSMOS_CONNECTION_STRING: ${{ secrets.COSMOS_CONNECTION_STRING }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
        run: python cleanup_and_migrate.py
