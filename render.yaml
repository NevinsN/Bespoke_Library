services:
  - type: web
    name: bespoke-api
    runtime: python
    rootDir: api
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: COSMOS_CONNECTION_STRING
        sync: false  # Set manually in Render dashboard
      - key: ADMIN_EMAIL
        sync: false
      - key: APP_BASE_URL
        value: https://bespoke.nicholasnevins.org
