<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bespoke Library | Slick the Sly</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 700px;
            margin: 0 auto;
            padding: 40px 20px;
            line-height: 1.6;
        }
        h1 { 
            color: #ffffff; 
            border-bottom: 2px solid #333; 
            padding-bottom: 15px;
            text-align: center;
            letter-spacing: -0.5px;
        }
        .word-count-total { 
            color: #888; 
            font-style: italic; 
            margin-bottom: 30px; 
            font-size: 0.95em;
            text-align: center;
        }
        ul { list-style: none; padding: 0; }
        li { padding: 20px 0; border-bottom: 1px solid #222; }
        .chapter-link { 
            color: #3498db; 
            text-decoration: none; 
            font-weight: 500; 
            font-size: 1.2em;
            display: inline-block;
            margin-bottom: 6px;
        }
        .badge-new {
            background-color: #3498db;
            color: #fff;
            font-size: 0.6em;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 10px;
            vertical-align: middle;
            text-transform: uppercase;
            display: inline-block;
        }
        .ch-metadata { 
            color: #666; 
            font-size: 0.85em; 
            font-family: monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .skeleton {
            background: linear-gradient(90deg, #222 25%, #333 50%, #222 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 4px;
            height: 20px;
            margin-bottom: 10px;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        /* Progress Bar Container */
        .goal-container {
            width: 100%;
            background-color: #222;
            border-radius: 4px;
            height: 8px;
            margin-top: 8px;
            overflow: hidden;
        }
        
        /* The Filling Part */
        .goal-fill {
            height: 100%;
            background: linear-gradient(90deg, #3498db, #2ecc71); /* Blue to Green gradient */
            width: 0%; /* Initial state */
            transition: width 1s ease-in-out;
        }
        
        /* Label text (e.g., 45%) */
        .goal-text {
            font-size: 10px;
            color: #888;
            text-align: right;
            margin-top: 4px;
            text-transform: uppercase;
        }
        #content
    </style>
</head>
<body>

    <div id="content">
        <h1>The Devious Adventures of Slick the Sly</h1>
        <p class="word-count-total">Total Manuscript Progress: <strong id="total-words">Calculating...</strong></p>

        <ul id="chapter-list">
            </ul>
    </div>

    <script>
        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const bookId = urlParams.get('book');
        
            if (!bookId) {
                await loadBookshelf();
            } else {
                // FIX 1: We pass the bookId variable here
                await loadChapters(bookId);
            }
        }
        
        async function loadBookshelf() {
            const list = document.getElementById('books-list'); // Or whatever your container ID is
        
            // 1. START: Show the Skeleton Loaders immediately
            // This creates 5 shimmering bars to fill the space
            list.innerHTML = `
                <div class="skeleton" style="width: 80%; height: 40px; margin-bottom: 20px;"></div>
                <div class="skeleton" style="width: 90%; height: 40px; margin-bottom: 20px;"></div>
                <div class="skeleton" style="width: 70%; height: 40px; margin-bottom: 20px;"></div>
            `;
        
            try {
                const response = await fetch('/api/GetNovels');
                const novels = await response.json();
        
                // 2. END: Clear the skeletons and inject real data
                list.innerHTML = ''; 
        
                if (novels.length === 0) {
                    list.innerHTML = "<p>No manuscripts found. Check your user permissions!</p>";
                    return;
                }
        
                novels.forEach(novel => {
                    const item = document.createElement('div');
                    item.innerHTML = `<a href="/reader.html?id=${novel.id}">${novel.display_name}</a>`;
                    list.appendChild(item);
                });
        
            } catch (err) {
                list.innerHTML = "<p>Error loading library. Are you logged in?</p>";
            }
        }
        
        // FIX 2: Added 'bookId' as a parameter
        async function loadChapters(bookId) {
            try {
                // FIX 3: Pass the manuscript_id to the API
                const response = await fetch(`/api/GetChapters?manuscript_id=${bookId}`);
                const chapters = await response.json();
                const list = document.getElementById('chapter-list');
                
                let totalWords = 0;
                document.querySelector('.word-count-total').style.display = 'block';

                list.innerHTML = chapters.map(ch => {
                    const words = ch.word_count || 0;
                    totalWords += words;
                    const readTime = Math.ceil(words / 225) || 1;
                    
                    let badge = "";
                    if (ch.date_added) {
                        const added = new Date(ch.date_added);
                        const now = new Date();
                        if ((now - added) < (48 * 60 * 60 * 1000)) {
                            badge = '<span class="badge-new">New</span>';
                        }
                    }

                    // FIX 4: Link directly to reader.html using the chapter _id
                    // We don't need &access= anymore because the API checks your login!
                    return `
                        <li>
                            <div>
                                <a class="chapter-link" href="/reader.html?id=${ch._id}">
                                    ${ch.title}${badge}
                                </a>
                                <div class="ch-metadata">
                                    ${words.toLocaleString()} words • ${readTime} min read
                                </div>
                            </div>
                        </li>
                    `;
                }).join('');

                document.getElementById('total-words').innerText = `${totalWords.toLocaleString()} words`;

            } catch (err) {
                console.error(err);
                document.getElementById('chapter-list').innerHTML = "<li>Error loading manuscript.</li>";
            }
        }

        window.onload = init;
    </script>
</body>
</html>
