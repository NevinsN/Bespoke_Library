<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reading...</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: serif; line-height: 1.8; max-width: 800px; margin: 0 auto; padding: 50px; }
        h1 { border-bottom: 1px solid #333; padding-bottom: 20px; }
        #content { white-space: pre-wrap; font-size: 1.2em; }
        
        /* Progress bar container */
        #progress-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: transparent;
            z-index: 1000;
        }
        
        /* The actual filling bar */
        #progress-bar {
            height: 100%;
            background: #3498db; /* Your signature blue */
            width: 0%;
            transition: width 0.1s ease-out;
        }
        
        /* Author/Admin Badge - Floating in the corner */
        .role-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(52, 152, 219, 0.2);
            border: 1px solid #3498db;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #3498db;
            cursor: pointer;
        }

    </style>
</head>
<body>
    <a href="index.html" style="color: #888; text-decoration: none;">← Back to Library</a>
    <h1 id="title">Loading...</h1>
    <div id="content">Fetching your story from the cloud...</div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const chapterId = params.get('id');

        async function loadChapter() {
            // This calls our backend API
            const response = await fetch(`/api/GetChapter?id=${chapterId}`);
            const data = await response.json();
            
            document.getElementById('title').innerText = data.title;
            document.getElementById('content').innerText = data.content;
            document.title = data.title + " | The Library";
        }

        if (chapterId) { loadChapter(); }
    </script>
</body>
</html>
