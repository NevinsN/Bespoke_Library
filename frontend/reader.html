<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reading...</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: serif; line-height: 1.8; max-width: 800px; margin: 0 auto; padding: 50px; }
        h1 { border-bottom: 1px solid #333; padding-bottom: 20px; }
        #content { white-space: pre-wrap; font-size: 1.2em; }
    </style>
</head>
<body>
    <a href="index.html" style="color: #888; text-decoration: none;">← Back to Library</a>
    <h1 id="title">Loading...</h1>
    <div id="content">Fetching your story from the cloud...</div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const chapterId = params.get('id');

        async function loadChapter() {
            // This calls our backend API
            const response = await fetch(`/api/GetChapter?id=${chapterId}`);
            const data = await response.json();
            
            document.getElementById('title').innerText = data.title;
            document.getElementById('content').innerText = data.content;
            document.title = data.title + " | The Library";
        }

        if (chapterId) { loadChapter(); }
    </script>
</body>
</html>
