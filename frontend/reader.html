<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bespoke Library | Reader</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Reader-specific layout tweaks */
        body { padding-top: 80px; }
        #reader-container { max-width: 650px; width: 100%; }
        #chapter-content { font-size: 1.15em; line-height: 1.8; margin-top: 30px; }
        #chapter-content p { margin-bottom: 1.5em; }
        
        /* Author mode subtle styling */
        .author-mode #chapter-content { 
            border-left: 2px solid var(--accent-color); 
            padding-left: 20px; 
        }
    </style>
</head>
<body>

    <div id="progress-container" style="position: fixed; top: 0; left: 0; width: 100%; height: 4px; background: rgba(255,255,255,0.1); z-index: 1000;">
        <div id="progress-bar" style="height: 100%; background: var(--accent-color); width: 0%;"></div>
    </div>

    <div id="reader-container">
        <div class="nav-header">
            <a href="/" class="back-link">← Bookshelf</a>
            <button id="mode-toggle" class="mode-btn">Mode: Reader</button>
        </div>
        
        <h1 id="chapter-title">Loading...</h1>
        <div id="meta-info" style="color: #666; font-size: 0.9em; margin-bottom: 20px;">Fetching manuscript details...</div>

        <div id="chapter-content">
            </div>

        <div class="nav-links" style="display: flex; justify-content: space-between; margin-top: 60px; padding-top: 20px; border-top: 1px solid var(--border-color);">
            <a href="#" id="prev-link" style="visibility: hidden; color: var(--accent-color); text-decoration: none;">&larr; Previous</a>
            <a href="#" id="next-link" style="visibility: hidden; color: var(--accent-color); text-decoration: none;">Next &rarr;</a>
        </div>
    </div>

    <script type="module" src="js/reader.js"></script>
</body>
</html>
