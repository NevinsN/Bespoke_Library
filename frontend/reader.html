<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bespoke Library | Reader</title>
    <style>
        :root { --bg: #121212; --text: #e0e0e0; --accent: #3498db; }
        body { background: var(--bg); color: var(--text); font-family: Georgia, serif; margin: 0; padding: 60px 20px; line-height: 1.8; display: flex; flex-direction: column; align-items: center; }
        
        #progress-container { position: fixed; top: 0; left: 0; width: 100%; height: 4px; background: #222; z-index: 1000; }
        #progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.1s; }

        #reader-container { max-width: 650px; width: 100%; }
        h1 { font-size: 2.2em; margin-bottom: 5px; color: #fff; }
        .meta { color: #666; font-size: 0.9em; margin-bottom: 40px; border-bottom: 1px solid #333; padding-bottom: 10px; font-family: sans-serif; }
        
        #chapter-content p { margin-bottom: 1.5em; }

        .nav-links { margin-top: 60px; display: flex; justify-content: space-between; border-top: 1px solid #333; padding-top: 30px; width: 100%; }
        .nav-links a { background: #1a1a1a; color: var(--accent); padding: 12px 20px; border-radius: 8px; border: 1px solid #333; text-decoration: none; font-weight: bold; font-family: sans-serif; }
        .nav-links a:hover { background: var(--accent); color: #fff; }

        .role-badge { position: fixed; bottom: 20px; right: 20px; background: rgba(52, 152, 219, 0.1); border: 1px solid var(--accent); padding: 8px; border-radius: 20px; color: var(--accent); cursor: pointer; font-size: 10px; font-weight: bold; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="progress-container"><div id="progress-bar"></div></div>
    
    <div id="reader-container">
        <a href="/" style="color: #666; text-decoration: none; font-family: sans-serif;">← Bookshelf</a>
        <h1 id="chapter-title">Loading...</h1>
        <div class="meta" id="meta-info">Fetching manuscript details...</div>
        <div id="chapter-content"></div>

        <div class="nav-links">
            <a href="#" id="prev-link" style="visibility: hidden;">&larr; Previous</a>
            <a href="#" id="next-link" style="visibility: hidden;">Next &rarr;</a>
        </div>
    </div>

    <script>
        // Progress Bar
        window.onscroll = () => {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            document.getElementById("progress-bar").style.width = (winScroll / height) * 100 + "%";
        };

        // Load Content
        async function loadChapter() {
            const id = new URLSearchParams(window.location.search).get('id');
            if (!id) return;

            try {
                const res = await fetch(`/api/GetChapterContent?id=${id}`);
                const data = await res.json();

                document.title = `${data.title} | Bespoke`;
                document.getElementById('chapter-title').innerText = data.title;
                document.getElementById('meta-info').innerText = `${data.word_count.toLocaleString()} words • ${data.manuscript_display_name}`;
                document.getElementById('chapter-content').innerHTML = data.content;

                // Nav Logic
                const p = document.getElementById('prev-link');
                const n = document.getElementById('next-link');
                if (data.prev_id) { p.href = `?id=${data.prev_id}`; p.style.visibility = 'visible'; }
                if (data.next_id) { n.href = `?id=${data.next_id}`; n.style.visibility = 'visible'; }
                
                window.scrollTo(0,0);
            } catch (e) { document.getElementById('chapter-title').innerText = "Error Loading."; }
        }

        // Role Switcher
        function setupRole() {
            const role = localStorage.getItem('view_as') || 'reader';
            const b = document.createElement('div');
            b.className = 'role-badge';
            b.innerText = `MODE: ${role.toUpperCase()}`;
            b.onclick = () => {
                localStorage.setItem('view_as', role === 'reader' ? 'author' : 'reader');
                location.reload();
            };
            document.body.appendChild(b);
        }

        window.onload = () => { setupRole(); loadChapter(); };
    </script>
</body>
</html>
